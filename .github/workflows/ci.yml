name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Smoke (dry-run, non-interactive)
        shell: bash
        run: |
          node dist/cli.js init --dry-run -y --all -a claude-code -a codex -a opencode
          node dist/cli.js scaffold --dry-run -y --all

      - name: E2E (real writes into a temp HOME + idempotency)
        shell: bash
        run: bash scripts/ci-e2e.sh
